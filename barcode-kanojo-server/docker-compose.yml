services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist database across restarts
      - kanojo-data:/data
      # Mount avatar_data from the iOS project (read-only)
      - ../BarcodeKanojo-iOS/BarcodeKanojo/Resources/avatar_data:/data/avatar_data:ro
      # Persist generated images across restarts
      - kanojo-static:/app/static
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:////data/barcode_kanojo.db
      - AVATAR_DATA_DIR=/data/avatar_data
      - UPLOAD_DIR=/app/static
    restart: unless-stopped

volumes:
  kanojo-data:
  kanojo-static:
